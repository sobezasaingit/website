<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f12;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;

.card{
    width:100%;
    max-width:500px;
    background:#1a1a22;

    border-radius:28px;

h1{
    font-size:2rem;

.tag{
    color:#a5a5b8;

    font-size:1rem;
}

.bio{
    line-height:1.6;
    color:#d6d6e0;
    margin-bottom:35px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.link{
    display:block;
    text-decoration:none;
    color:white;
    background:#ff00ff;
    padding:16px;
    border-radius:16px;
    font-weight:bold;
    transition:0.2s;
}

.link:hover{
    background:#00ff00;
}

.footer{
    margin-top:30px;
    color:#ff0000;
    font-size:0.9rem;
}
</style>
</head>
